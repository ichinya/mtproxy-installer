stream {
    map $ssl_preread_server_name $backend_dispatcher {
        tg.example.com 127.0.0.1:600;
        default        127.0.0.1:4443;
    }

    server {
        listen 443;
        proxy_pass $backend_dispatcher;
        ssl_preread on;
        proxy_connect_timeout 5s;
        proxy_timeout 1h;
    }
}
