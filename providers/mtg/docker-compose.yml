services:
  mtg:
    image: ${MTG_IMAGE:-ghcr.io/9seconds/mtg:latest}
    container_name: mtg
    restart: unless-stopped
    environment:
      MTG_DEBUG: ${MTG_DEBUG:-info}
    volumes:
      - ./mtg.conf:/etc/mtg.conf:ro
      - ./data:/var/lib/mtg
    ports:
      - "${PORT}:3128/tcp"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=16m
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
